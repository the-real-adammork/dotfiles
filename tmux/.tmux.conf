
set -g default-terminal "screen-256color"

set-option -g mouse on

# Copy mode
set -g mode-keys vi
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer

unbind C-b
set -g prefix `
bind-key ` send-prefix

set -sg escape-time 1 # quicker responses
bind C-a send-prefix # Pass on ctrl-a for other apps
set -g base-index 1 # Numbering of windows
set -g pane-base-index 1 # Numbering of Panes
bind c new-window      -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}" # Split panes horizontal
bind - split-window -v -c "#{pane_current_path}" # Split panes vertically

# set history buffer size to be massive
set-option -g history-limit 10000

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3'

# Catppuccin theme config (must be set before loading)
set -g @catppuccin_flavor "latte"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

# Load catppuccin
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# Status line (must be set after catppuccin is loaded)
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_session}"

# VIM movement commands for scroll buffers ?
setw -g mode-keys vi
set -g status-keys vi

# Setup 'v' to begin selection, just like Vim
bind-key -T copy-mode-vi 'v' send -X begin-selection

 # Setup 'y' to yank (copy), just like Vim
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# VI-Like movement for panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# choose window/session
bind-key "'" choose-window
bind-key '"' choose-session

bind R source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'

# Disable layout switching which is super annoying
unbind space
